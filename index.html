// ============================================================
// SHUFFLE
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// BUILD SESSION
// ============================================================
function buildSession(pool, count, chapter) {
  const byCat = {};
  pool.forEach(q => {
    if (!byCat[q.cat]) byCat[q.cat] = [];
    byCat[q.cat].push(q);
  });

  let picked = [];
  const catOrder = chapter ? chapter.categoryOrder : Object.keys(byCat);
  const cats = catOrder.filter(c => byCat[c] && byCat[c].length > 0);
  const perCat = Math.max(1, Math.floor(count / cats.length));
  let remaining = count;

  cats.forEach((cat, idx) => {
    const isLast = idx === cats.length - 1;
    const take = isLast ? remaining : Math.min(perCat, byCat[cat].length, remaining);
    const shuffled = shuffle(byCat[cat]);
    picked.push(...shuffled.slice(0, take));
    remaining -= take;
  });

  if (remaining > 0) {
    const usedSet = new Set(picked);
    const leftover = shuffle(pool.filter(q => !usedSet.has(q)));
    picked.push(...leftover.slice(0, remaining));
  }

  picked = shuffle(picked);

  // Shuffle choices
  picked = picked.map(q => {
    const indices = q.choices.map((_, i) => i);
    const si = shuffle(indices);
    return { ...q, choices: si.map(i => q.choices[i]), answer: si.indexOf(q.answer) };
  });

  // Insert lessons
  const lessons = chapter ? chapter.lessons : {};
  const seenCats = new Set();
  const session = [];
  picked.forEach(q => {
    if (!seenCats.has(q.cat) && lessons[q.cat]) {
      seenCats.add(q.cat);
      session.push({ type: "lesson", ...lessons[q.cat] });
    }
    session.push({ type: "quiz", ...q });
  });

  return session;
}

      <button class="mode-btn" onclick="startQuiz(${total})">
        <div class="mode-title">全問チャレンジ（${total}問）</div>
        <div class="mode-desc">全問やって完璧にしよう</div>
      </button>
      <p style="margin-top:16px;margin-bottom:6px"><strong>📝 過去問レベル編</strong>：IPA公開の本番レベル問題</p>
      ${examBtn}
    </div>
  `;
}

// ============================================================
// START QUIZ
// ============================================================
function startQuiz(count) {
  sessionData = buildSession(currentChapter.questions, count, currentChapter);
  currentIndex = 0; correct = 0; wrong = 0; streak = 0; maxStreak = 0;
  results = []; wrongQuestions = [];
  totalQuizzes = sessionData.filter(d => d.type === "quiz").length;
  quizCount = 0;
  document.getElementById("scoreBar").style.display = "flex";
  render();
}

function startExamQuiz() {
  const pool = currentChapter.examQuestions;
  if (!pool || pool.length === 0) return;
  sessionData = buildSession(pool, pool.length, currentChapter);
  currentIndex = 0; correct = 0; wrong = 0; streak = 0; maxStreak = 0;
  results = []; wrongQuestions = [];
  totalQuizzes = sessionData.filter(d => d.type === "quiz").length;
  quizCount = 0;
  document.getElementById("scoreBar").style.display = "flex";
  render();
}

function startRetry(questions) {
  sessionData = buildSession(questions, questions.length, currentChapter);
  currentIndex = 0; correct = 0; wrong = 0; streak = 0; maxStreak = 0;
  results = []; wrongQuestions = [];
  totalQuizzes = sessionData.filter(d => d.type === "quiz").length;
  quizCount = 0;
  document.getElementById("scoreBar").style.display = "flex";
  render();
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  const area = document.getElementById("quizArea");
  area.innerHTML = "";
  if (currentIndex >= sessionData.length) { showResult(); return; }
  const item = sessionData[currentIndex];
  updateProgress();
  if (item.type === "lesson") renderLesson(area, item);
  else renderQuiz(area, item);
}

function updateProgress() {
  const pct = totalQuizzes > 0 ? (quizCount / totalQuizzes) * 100 : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${quizCount} / ${totalQuizzes} 問`;
  document.getElementById("correctCount").textContent = correct;
  document.getElementById("wrongCount").textContent = wrong;
  document.getElementById("streakCount").textContent = streak;
}

function renderLesson(area, item) {
  const card = document.createElement("div");
  card.className = "card mini-lesson";
  card.innerHTML = `
    <div class="tag">${item.tag}</div>
    <h3>${item.title}</h3>
    <div>${item.body}</div>
    <button class="mini-lesson-btn" onclick="nextItem()">OK!</button>
  `;
  area.appendChild(card);
}

function renderQuiz(area, item) {
  quizCount++;
  updateProgress();
  const card = document.createElement("div");
  card.className = "card";
  card.id = "quizCard";

  const labels = ["A", "B", "C", "D"];
  let choicesHtml = '<div class="choices">';
  item.choices.forEach((c, i) => {
    choicesHtml += `<button class="choice-btn" onclick="selectAnswer(${i})">${labels[i]}. ${c}</button>`;
  });
  choicesHtml += '</div>';

  card.innerHTML = `
    <div class="q-number">Q${quizCount}</div>
    <span class="q-category">${item.cat}</span>
    ${item.source ? `<div class="q-source">${item.source}</div>` : ''}
    <div class="q-text">${item.q}</div>
    ${choicesHtml}
  `;
  area.appendChild(card);
}

function selectAnswer(selected) {
  const item = sessionData[currentIndex];
  const btns = document.querySelectorAll(".choice-btn");
  const isCorrect = selected === item.answer;

  btns.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === item.answer) btn.classList.add("correct");
    if (i === selected && !isCorrect) btn.classList.add("wrong");
  });

  if (isCorrect) { correct++; streak++; if (streak > maxStreak) maxStreak = streak; }
  else {
    wrong++; streak = 0;
    const pool = currentChapter ? currentChapter.questions : [];
    const orig = pool.find(oq => oq.q === item.q);
    if (orig) wrongQuestions.push(orig);
  }

  results.push({ q: item.q, cat: item.cat, correct: isCorrect, yourAnswer: item.choices[selected], rightAnswer: item.choices[item.answer] });
  updateProgress();

  const fb = document.createElement("div");
  fb.className = `feedback ${isCorrect ? "correct" : "wrong"}`;
  fb.innerHTML = `
    <div class="fb-title">${isCorrect ? "正解！" : "不正解..."}</div>
    <div>${item.explain}</div>
    <button class="next-btn" onclick="nextItem()">次へ</button>
  `;
  document.getElementById("quizCard").appendChild(fb);
  setTimeout(() => fb.scrollIntoView({ behavior: "smooth", block: "center" }), 100);
}

function nextItem() {
  currentIndex++;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showResult() {
  const area = document.getElementById("quizArea");
  const pct = Math.round((correct / totalQuizzes) * 100);

  let emoji, msg;
  if (pct === 100) { emoji = "&#x1F389;"; msg = "パーフェクト！完璧！"; }
  else if (pct >= 80) { emoji = "&#x1F44F;"; msg = "よくできました！間違えた問題を復習すれば完璧！"; }
  else if (pct >= 60) { emoji = "&#x1F4AA;"; msg = "いい感じ！間違えた問題を見直してもう一回！"; }
  else { emoji = "&#x1F4D6;"; msg = "ポイントを確認してもう一度チャレンジしよう！"; }

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressText").textContent = "完了！";

  let reviewHtml = '<div class="review-list"><h3 style="color:#fff;margin-bottom:12px;">結果一覧</h3>';
  results.forEach((r, i) => {
    reviewHtml += `
      <div class="review-item ${r.correct ? 'r-correct' : 'r-wrong'}">
        <div class="ri-q">${r.correct ? '&#x2705;' : '&#x274C;'} Q${i+1}. [${r.cat}] ${r.q}</div>
        ${!r.correct ? `<div class="ri-a">あなたの答え: ${r.yourAnswer}<br>正解: ${r.rightAnswer}</div>` : ''}
      </div>`;
  });
  reviewHtml += '</div>';

  const hasWrong = wrongQuestions.length > 0;
  const chTitle = currentChapter ? currentChapter.title : "";

  area.innerHTML = `
    <div class="card result">
      <div class="result-emoji">${emoji}</div>
      <h2>${chTitle} クイズ完了！</h2>
      <div class="result-score">${pct}点</div>
      <div class="result-details">
        <div class="rd-item"><div class="rd-num" style="color:#00b894">${correct}</div><div class="rd-label">正解</div></div>
        <div class="rd-item"><div class="rd-num" style="color:#e17055">${wrong}</div><div class="rd-label">不正解</div></div>
        <div class="rd-item"><div class="rd-num" style="color:#fdcb6e">${maxStreak}</div><div class="rd-label">最大連続正解</div></div>
      </div>
      <div class="result-msg">${msg}</div>
      <button class="retry-btn" onclick="selectChapter('${currentChapter ? currentChapter.id : ''}'); window.scrollTo({top:0,behavior:'smooth'})">同じ章をもう一回</button>
      ${hasWrong ? `<button class="retry-btn secondary" onclick="retryWrong()">間違えた${wrongQuestions.length}問だけ再挑戦</button>` : ''}
      <button class="retry-btn secondary" onclick="showChapterSelect(); window.scrollTo({top:0,behavior:'smooth'})">章の選択に戻る</button>
      ${reviewHtml}
    </div>
  `;
}

function retryWrong() {
  startRetry([...wrongQuestions]);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ============================================================
// INIT
// ============================================================
showChapterSelect();
</script>

</body>
</html>
